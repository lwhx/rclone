---
name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            gotags: cmount
            ext: ''
            install_deps: true
            cgo_enabled: true
          - os: ubuntu-latest
            goos: linux
            goarch: 386
            gotags: ''
            ext: ''
            install_deps: false
            cgo_enabled: false
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            gotags: ''
            ext: ''
            install_deps: false
            cgo_enabled: false
          - os: windows-latest
            goos: windows
            goarch: amd64
            gotags: cmount
            ext: '.exe'
            install_deps: false
            cgo_enabled: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install FUSE (Linux)
        if: matrix.install_deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse-dev fuse

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo_enabled }}
        run: |
          go build -v -tags "${{ matrix.gotags }}" -ldflags "-s -w" -o rclone${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rclone-${{ matrix.goos }}-${{ matrix.goarch }}
          path: rclone${{ matrix.ext }}
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
